server:
  port: 8082

spring:
  application:
    name: leaf-service
  config:
    import:
      - optional:nacos:shared-infra.yaml?group=COMMON
      - optional:nacos:${spring.application.name}.yaml
  datasource:
    url: jdbc:mysql://localhost:13306/live_community?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:18848
        enabled: true
      config:
        server-addr: ${NACOS_HOST:localhost}:18848

dubbo:
  application:
    name: leaf-service
  registry:
    address: nacos://${NACOS_HOST:localhost}:18848
  protocol:
    name: tri
    port: 20881

leaf:
  snowflake:
    worker-id: 1
    datacenter-id: 1
