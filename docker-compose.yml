# ============================================================
# Infrastructure-only docker-compose for local development.
# Application services (leaf/upload/note/gateway/auth/search-*)
# run directly on the host — see scripts/start-all.sh
# ============================================================

services:
  # ==================== Service Discovery ====================

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "18848:8848"
      - "19848:9848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - live-community

  # ==================== Databases ====================

  mysql:
    image: mysql:8.0
    container_name: mysql
    # ---- Canal binlog requirements ----
    command:
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --server-id=1
      - --binlog-row-image=FULL
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: live_community
    ports:
      - "13306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./leaf-service/src/main/resources/sql/init_leaf.sql:/docker-entrypoint-initdb.d/01-init-leaf.sql
      - ./auth-service/src/main/resources/sql/init_auth.sql:/docker-entrypoint-initdb.d/02-init-auth.sql
    healthcheck:
      test: mysqladmin ping -h localhost -u root -proot
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - live-community

  cassandra:
    image: cassandra:latest
    container_name: cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: live-community
    ports:
      - "19042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: cqlsh -e "DESCRIBE KEYSPACES" localhost 9042
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - live-community

  # ==================== Cache & Message Queue ====================

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - live-community

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 30
    networks:
      - live-community

  # ==================== Object Storage ====================

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - live-community

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/uploads --ignore-existing;
      mc mb local/notes --ignore-existing;
      echo 'MinIO buckets created';
      exit 0
      "
    networks:
      - live-community

  # ==================== Search Infrastructure ====================

  elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile.es
    image: live-community/elasticsearch-ik:8.12.0
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - live-community

  canal-server:
    image: canal/canal-server:v1.1.8
    container_name: canal-server
    ports:
      - "11111:11111"
    volumes:
      - ./scripts/canal.properties:/home/admin/canal-server/conf/canal.properties:ro
      - ./scripts/canal-instance.properties:/home/admin/canal-server/conf/example/instance.properties:ro
    environment:
      CANAL_ADDRESS: canal-server
      CANAL_PORT: 11111
      CANAL_DESTINATIONS: example
      CANAL_INSTANCE_MASTER_ADDRESS: mysql:3306
      CANAL_INSTANCE_DBUSERNAME: root
      CANAL_INSTANCE_DBPASSWORD: root
      CANAL_SERVER_MODE: kafka
      CANAL_MQ_SERVERS: kafka:9092
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - live-community

networks:
  live-community:
    driver: bridge

volumes:
  mysql-data:
  minio-data:
  cassandra-data:
