server:
  port: 8084

spring:
  application:
    name: auth-service
  config:
    import:
      - optional:nacos:shared-infra.yaml?group=COMMON
      - optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:18848
        enabled: true
      config:
        server-addr: ${NACOS_HOST:localhost}:18848
  datasource:
    url: jdbc:mysql://localhost:13306/live_community?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 16379

dubbo:
  application:
    name: auth-service
  registry:
    address: nacos://${NACOS_HOST:localhost}:18848
  protocol:
    name: tri
    port: 20884

jwt:
  secret: super-secret-key-change-in-production

wechat:
  app-id: ""
  app-secret: ""

taobao:
  app-key: ""
  app-secret: ""

sms:
  provider: mock
  code-length: 6
  code-ttl: 300
